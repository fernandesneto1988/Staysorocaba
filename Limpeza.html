<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Limpeza — Aptos</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #dbe3ee;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --success-border: #86efac;
      --warning-bg: #fffbeb;
      --warning-border: #fbbf24;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --danger-border: #fca5a5;
      --teal: #0f766e;
      --teal-bg: #ccfbf1;
      --teal-border: #5eead4;
      --free-bg: #f0fdf4;
      --free-border: #86efac;
      --occupied-bg: #dbeafe;
      --occupied-border: #93c5fd;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .header {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .header h1 { font-size: 21px; font-weight: bold; }
    .header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── DATE NAV ── */
    .date-nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .date-nav button {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: var(--text);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .date-nav button:active { background: #e2e8f0; }
    .date-nav .today-btn { background: var(--primary); color: white; border-color: var(--primary); }
    .date-nav .date-display {
      font-size: 16px;
      font-weight: bold;
      min-width: 190px;
      text-align: center;
      color: var(--text);
    }

    /* ── SUMMARY BAR ── */
    .summary-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      border: 2px solid transparent;
    }
    .chip-done    { background: var(--success-bg); color: #166534; border-color: var(--success-border); }
    .chip-pending { background: var(--warning-bg); color: #92400e; border-color: var(--warning-border); }
    .chip-total   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

    /* ── SECTION TITLE ── */
    .section-title {
      padding: 20px 16px 10px;
      font-size: 18px;
      font-weight: bold;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-count {
      background: #e5e7eb;
      color: #374151;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: bold;
    }

    /* ── LIMPEZA GRID ── */
    .clean-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 16px 8px;
    }

    /* ── LIMPEZA CARD ── */
    .clean-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 3px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: transform .12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }
    .clean-card:active { transform: scale(0.97); }
    .clean-card.done              { background: var(--success-bg); border-color: var(--success-border); }
    .clean-card.pending-checkout  { background: var(--danger-bg);  border-color: var(--danger-border); }
    .clean-card.pending-weekly    { background: var(--teal-bg);    border-color: var(--teal-border); }

    .check-circle {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: all .15s;
    }
    .clean-card.done .check-circle        { background: var(--success); border-color: var(--success); color: white; }
    .clean-card.pending-checkout .check-circle { border-color: var(--danger); }
    .clean-card.pending-weekly   .check-circle { border-color: var(--teal); }

    .clean-apt-num {
      font-size: 26px;
      font-weight: bold;
      line-height: 1;
    }
    .clean-card.done .clean-apt-num { color: #166534; }

    .clean-guest {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.3;
    }
    .clean-guest strong { color: var(--text); font-size: 14px; display: block; }

    .clean-type-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-checkout { background: var(--danger-bg); color: #991b1b; }
    .badge-weekly   { background: var(--teal-bg);   color: #115e59; }
    .badge-done-lbl { font-size: 13px; font-weight: bold; color: #166534; }

    /* ══════════════════════════════════════════
       MAPA DE APTOS
    ══════════════════════════════════════════ */
    .map-section {
      margin: 8px 0 0;
      background: white;
      border-top: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
      padding-bottom: 20px;
    }

    .map-section-title {
      padding: 18px 16px 10px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Legenda */
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: bold;
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Grid do mapa */
    .map-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 16px;
    }

    /* Card do mapa */
    .map-card {
      border-radius: 14px;
      border: 2px solid var(--border);
      background: white;
      padding: 12px 10px;
      text-align: center;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    /* Status do mapa */
    .map-card.free     { background: var(--free-bg);     border-color: var(--free-border); }
    .map-card.occupied { background: var(--occupied-bg); border-color: var(--occupied-border); }
    .map-card.checkin  { background: #fef3c7;            border-color: #fde68a; }
    .map-card.checkout { background: var(--danger-bg);   border-color: var(--danger-border); }
    .map-card.cleaning { background: var(--teal-bg);     border-color: var(--teal-border); }

    .map-apt-num {
      font-size: 20px;
      font-weight: bold;
      line-height: 1;
    }
    .map-status-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .map-card.free     .map-status-badge { background: #bbf7d0; color: #166534; }
    .map-card.occupied .map-status-badge { background: #bfdbfe; color: #1d4ed8; }
    .map-card.checkin  .map-status-badge { background: #fde68a; color: #92400e; }
    .map-card.checkout .map-status-badge { background: #fecaca; color: #991b1b; }
    .map-card.cleaning .map-status-badge { background: #99f6e4; color: #115e59; }

    .map-guest-name {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── LOADING ── */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 14px;
    }
    #loadingOverlay p { font-size: 16px; color: var(--muted); }
    .spinner {
      width: 44px; height: 44px;
      border: 5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 17px; }

    /* ── SYNC STATUS ── */
    #syncStatus {
      position: fixed;
      bottom: 16px; right: 16px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      box-shadow: var(--shadow);
      z-index: 999;
      transition: .3s;
    }
    #syncStatus.syncing { border-color: #bfdbfe; color: #1d4ed8; }
    #syncStatus.saved   { border-color: #86efac; color: #166534; }
    #syncStatus.error   { border-color: #fca5a5; color: #991b1b; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1f2937;
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: bold;
      z-index: 9998;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .clean-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .map-grid   { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .clean-apt-num { font-size: 22px; }
      .check-circle  { width: 44px; height: 44px; font-size: 22px; }
    }
    @media (min-width: 700px) {
      .clean-grid { grid-template-columns: repeat(4, 1fr); }
      .map-grid   { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1000px) {
      .clean-grid { grid-template-columns: repeat(6, 1fr); }
      .map-grid   { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>Carregando...</p>
</div>

<div id="toast"></div>
<div id="syncStatus" class="saved">✅ Sincronizado</div>

<!-- Header -->
<div class="header">
  <div>
    <h1>🧹 Limpeza do Dia</h1>
    <div class="sub" id="headerSub"></div>
  </div>
</div>

<!-- Date Nav -->
<div class="date-nav">
  <button onclick="changeDate(-1)">←</button>
  <div class="date-display" id="dateDisplay">—</div>
  <button onclick="changeDate(1)">→</button>
  <button class="today-btn" onclick="changeDate(0)">Hoje</button>
</div>

<!-- Summary -->
<div class="summary-bar" id="summaryBar"></div>

<!-- Lista de limpeza + Mapa -->
<div id="content"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import {
    getFirestore, collection, doc,
    getDocs, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjg71nvC5hIgLodWiOcoEjg1-cZHwvjOE",
    authDomain: "airbnb-do-neto.firebaseapp.com",
    projectId: "airbnb-do-neto",
    storageBucket: "airbnb-do-neto.firebasestorage.app",
    messagingSenderId: "873938520196",
    appId: "1:873938520196:web:d616b03cb3d6871e18dad1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const BOOKINGS_COL  = collection(db, 'reservas');
  const CLEANINGS_COL = collection(db, 'limpezas');

  const FIXED_APARTMENTS = ["1","2","3","4","5","6","11","12","13","14","15","16","21","22","23","24","25","26"];
  const MONTH_NAMES      = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAY_NAMES_FULL   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

  let bookings        = [];
  let cleaningRecords = [];
  let currentDate     = todayStr();
  let isReady         = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function addDays(dateStr, days) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDateBR(s) {
    if (!s) return '-';
    const [y,m,d] = s.split('-');
    return `${d}/${m}/${y}`;
  }
  function getWeeklyDates(b) {
    if (b.cancelled || !b.checkin || !b.checkout) return [];
    const r = []; let next = addDays(b.checkin, 7);
    while (next < b.checkout) { r.push(next); next = addDays(next, 7); }
    return r;
  }
  function cleanKey(bookingId, type, date) { return `${bookingId}__${type}__${date}`; }
  function isDone(bookingId, type, date) {
    return cleaningRecords.some(r => r.key === cleanKey(bookingId, type, date) && r.done);
  }
  function setSyncStatus(state, msg) {
    const el = document.getElementById('syncStatus');
    el.className = state; el.textContent = msg;
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Salvar limpeza ────────────────────────────────────────────────────────
  async function markCleaning(bookingId, type, date, done) {
    setSyncStatus('syncing', '🔄 Salvando...');
    const key    = cleanKey(bookingId, type, date);
    const record = { key, bookingId, type, date, done, updatedAt: new Date().toISOString() };
    const idx    = cleaningRecords.findIndex(r => r.key === key);
    if (idx >= 0) cleaningRecords[idx] = record; else cleaningRecords.push(record);
    try {
      await setDoc(doc(db, 'limpezas', key), record);
      setSyncStatus('saved', '✅ Sincronizado');
      showToast(done ? '✅ Marcado como feito!' : '↩️ Desmarcado');
    } catch(err) {
      setSyncStatus('error', '❌ Erro ao salvar');
    }
    render();
  }

  window.handleCheck = (id, type, date, wasDone) => markCleaning(id, type, date, !wasDone);

  // ── Lista de limpezas do dia ──────────────────────────────────────────────
  function buildCleanItems(ref) {
    const items = [];
    bookings.forEach(b => {
      if (b.cancelled) return;
      if (b.checkout === ref)
        items.push({ booking: b, type: 'checkout', date: ref, done: isDone(b.id, 'checkout', ref) });
      getWeeklyDates(b).forEach(d => {
        if (d === ref)
          items.push({ booking: b, type: 'weekly', date: ref, done: isDone(b.id, 'weekly', ref) });
      });
    });
    return items.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.booking.apartment.localeCompare(b.booking.apartment, undefined, { numeric: true });
    });
  }

  // ── Status de cada apto no dia ────────────────────────────────────────────
  function getAptStatus(name, ref) {
    const today   = todayStr();
    const apts    = bookings.filter(b => b.apartment === name && !b.cancelled);
    const active  = apts.find(b => b.checkin < ref && b.checkout > ref);
    const ciToday = apts.find(b => b.checkin  === ref);
    const coToday = apts.find(b => b.checkout === ref);
    const weekly  = apts.find(b => getWeeklyDates(b).includes(ref));

    // Lógica de hora (só vale pra hoje)
    const agora  = new Date();
    const hora   = agora.getHours() + agora.getMinutes() / 60;
    const apos12 = (ref === today) && hora >= 12;

    if (!apos12) {
      if (coToday) return { status: 'checkout', label: 'Check-out', booking: coToday };
      if (weekly)  return { status: 'cleaning', label: 'Faxina',    booking: weekly  };
      if (ciToday) return { status: 'checkin',  label: 'Check-in',  booking: ciToday };
      if (active)  return { status: 'occupied', label: 'Ocupado',   booking: active  };
    } else {
      if (ciToday) return { status: 'checkin',  label: 'Check-in',  booking: ciToday };
      if (weekly)  return { status: 'cleaning', label: 'Faxina',    booking: weekly  };
      if (active)  return { status: 'occupied', label: 'Ocupado',   booking: active  };
    }
    return { status: 'free', label: 'Livre', booking: null };
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const ref     = currentDate;
    const today   = todayStr();
    const dateObj = new Date(ref + 'T00:00:00');
    const dow     = dateObj.getDay();
    const diff    = Math.round((dateObj - new Date(today + 'T00:00:00')) / 86400000);

    // Labels de data
    const dayLabel =
      diff === 0  ? 'Hoje'    :
      diff === 1  ? 'Amanhã'  :
      diff === -1 ? 'Ontem'   :
      diff > 0    ? `Em ${diff} dias` :
                    `${Math.abs(diff)} dias atrás`;

    document.getElementById('headerSub').textContent =
      `${MONTH_NAMES[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
    document.getElementById('dateDisplay').textContent =
      `${dayLabel} — ${DAY_NAMES_FULL[dow]}, ${formatDateBR(ref)}`;

    // ── Lista de limpeza ──────────────────────────────────────────────────
    const items    = buildCleanItems(ref);
    const doneCount    = items.filter(i => i.done).length;
    const pendingCount = items.length - doneCount;

    document.getElementById('summaryBar').innerHTML = `
      <span class="summary-chip chip-done">✅ ${doneCount} feita${doneCount !== 1 ? 's' : ''}</span>
      <span class="summary-chip chip-pending">⏳ ${pendingCount} pendente${pendingCount !== 1 ? 's' : ''}</span>
      <span class="summary-chip chip-total">📋 ${items.length} total</span>`;

    const checkoutItems = items.filter(i => i.type === 'checkout');
    const weeklyItems   = items.filter(i => i.type === 'weekly');

    let cleanHtml = '';

    if (!items.length) {
      cleanHtml = `
        <div class="empty-state">
          <span class="emoji">🎉</span>
          <p>Sem limpezas para este dia!</p>
        </div>`;
    } else {
      if (checkoutItems.length) {
        cleanHtml += `
          <div class="section-title">
            🚪 Limpeza de Saída
            <span class="section-count">${checkoutItems.length}</span>
          </div>
          <div class="clean-grid">
            ${checkoutItems.map(renderCleanCard).join('')}
          </div>`;
      }
      if (weeklyItems.length) {
        cleanHtml += `
          <div class="section-title">
            🧹 Faxina Semanal
            <span class="section-count">${weeklyItems.length}</span>
          </div>
          <div class="clean-grid">
            ${weeklyItems.map(renderCleanCard).join('')}
          </div>`;
      }
    }

    // ── Mapa de Aptos ─────────────────────────────────────────────────────
    const mapCards = FIXED_APARTMENTS.map(name => {
      const { status, label, booking } = getAptStatus(name, ref);
      const guestFirst = booking ? booking.guestName.split(' ')[0] : '';
      return `
        <div class="map-card ${status}">
          <div class="map-apt-num">Apto ${name}</div>
          <span class="map-status-badge">${label}</span>
          ${guestFirst ? `<div class="map-guest-name">${guestFirst}</div>` : ''}
        </div>`;
    }).join('');

    const mapHtml = `
      <div class="map-section">
        <div class="map-section-title">🏠 Situação dos Aptos</div>
        <div class="map-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#22c55e;"></span>Livre</span>
          <span class="legend-item"><span class="legend-dot" style="background:#3b82f6;"></span>Ocupado</span>
          <span class="legend-item"><span class="legend-dot" style="background:#f59e0b;"></span>Check-in</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ef4444;"></span>Check-out</span>
          <span class="legend-item"><span class="legend-dot" style="background:#14b8a6;"></span>Faxina</span>
        </div>
        <div class="map-grid">${mapCards}</div>
      </div>`;

    document.getElementById('content').innerHTML = cleanHtml + mapHtml;
  }

  function renderCleanCard(item) {
    const b        = item.booking;
    const cardClass = item.done ? 'done' : (item.type === 'checkout' ? 'pending-checkout' : 'pending-weekly');
    return `
      <div class="clean-card ${cardClass}"
           onclick="handleCheck('${b.id}','${item.type}','${item.date}',${item.done})">
        <div class="check-circle">${item.done ? '✓' : ''}</div>
        <div class="clean-apt-num">Apto ${b.apartment}</div>
        <div class="clean-guest">
          <strong>${b.guestName.split(' ')[0]}</strong>
          ${formatDateBR(b.checkin)} → ${formatDateBR(b.checkout)}
        </div>
        ${item.done
          ? `<span class="badge-done-lbl">✅ Feito</span>`
          : `<span class="clean-type-badge ${item.type === 'checkout' ? 'badge-checkout' : 'badge-weekly'}">
               ${item.type === 'checkout' ? 'Saída' : 'Semanal'}
             </span>`}
      </div>`;
  }

  // ── Navegação de data ─────────────────────────────────────────────────────
  window.changeDate = (delta) => {
    currentDate = delta === 0 ? todayStr() : addDays(currentDate, delta);
    render();
  };

  // ── Firebase ──────────────────────────────────────────────────────────────
  function initListeners() {
    onSnapshot(BOOKINGS_COL, snap => {
      bookings = snap.docs.map(d => d.data());
      if (isReady) render();
    });
    onSnapshot(CLEANINGS_COL, snap => {
      cleaningRecords = snap.docs.map(d => d.data());
      if (isReady) render();
    });
  }

  async function init() {
    try {
      const [bSnap, cSnap] = await Promise.all([
        getDocs(BOOKINGS_COL),
        getDocs(CLEANINGS_COL)
      ]);
      bookings        = bSnap.docs.map(d => d.data());
      cleaningRecords = cSnap.docs.map(d => d.data());
      isReady = true;
      render();
      initListeners();
      document.getElementById('loadingOverlay').style.display = 'none';
    } catch(err) {
      document.getElementById('loadingOverlay').innerHTML = `
        <div style="text-align:center;padding:20px;">
          <p style="color:#dc2626;font-size:18px;">❌ Erro ao conectar</p>
          <p style="color:#6b7280;">${err.message}</p>
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
